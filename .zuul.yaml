---
- project:
    templates:
      - publish-stx-docs
      - stx-release-notes-jobs
    check:
      jobs:
        - tools-tox-linters
        - tools-tox-pep8
        - tools-tox-pylint
    gate:
      jobs:
        - tools-tox-linters
        - tools-tox-pep8
        - tools-tox-pylint
    post:
      jobs:
        - stx-tools-upload-git-mirror

- job:
    name: tools-tox-linters
    parent: openstack-tox-linters
    description: |
      Run linters
    nodeset: debian-bullseye

- job:
    name: tools-tox-pep8
    parent: openstack-tox-pep8
    description: |
      Check conformance with pep8
    nodeset: debian-bullseye

- job:
    name: tools-tox-pylint
    parent: openstack-tox-pylint
    description: |
      Run pylint
    nodeset: debian-bullseye

- job:
    name: stx-tools-upload-git-mirror
    parent: upload-git-mirror
    description: >
      Mirrors opendev.org/starlingx/tools to
      github.com/starlingx/tools
    vars:
      git_mirror_repository: starlingx/tools
    secrets:
      - name: git_mirror_credentials
        secret: stx-tools-github-secret3
        pass-to-parent: true

- secret:
    name: stx-tools-github-secret3
    data:
      user: git
      host: github.com
